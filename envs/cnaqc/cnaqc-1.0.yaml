channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - r-base=4.3
  - r-remotes
  - r-optparse
  # CNAqc Imports (CRAN)
  - r-crayon
  - r-ggpubr
  - r-ggrepel
  - r-vcfr
  - r-clisymbols
  - r-rcolorbrewer
  - r-gtools
  - r-magrittr
  - r-dplyr
  - r-ggplot2
  - r-cli
  - r-tibble
  - r-tidyr
  - r-akima
  - r-cowplot
  - r-ggsci
  - r-progress
  - r-readr
  - r-r.utils
  - r-scales
  - r-data.table
  - r-biocmanager
  # CNAqc Imports (Bioconductor)
  - bioconductor-rhtslib
  - bioconductor-rsamtools
  - bioconductor-genomicranges
  - bioconductor-variantannotation
  - bioconductor-annotationdbi
  - bioconductor-complexheatmap
  # Transitive dep of Suggests (knitr/rmarkdown chain); pre-installed to
  # avoid compiling sass C++ source during post-deploy install_github
  - r-sass
