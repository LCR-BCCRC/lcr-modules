lcr-modules:

    sage:

        inputs:
            # Available wildcards: {seq_type} {genome_build} {sample_id}
            sample_bam: "__UPDATE__"


        scratch_subdirectories: []

        # Additional flags to pass to SAGE.
        # -skip_bqr and -skip_msi_jitter bypass the REDUX file requirements.
        # Remove these if REDUX outputs are available for your samples.
        options:
            sage_run: "-skip_bqr -skip_msi_jitter"
            sage_jar: "{MODSDIR}/jar/sage-5.1-jar-with-dependencies.jar"


        conda_envs:
            wget: "{MODSDIR}/envs/wget-1.20.1.yaml"
            sage: "{MODSDIR}/envs/hmftools-sage-5.0.yaml"
            bcftools: "{MODSDIR}/envs/bcftools-1.10.2.yaml"

        container_envs:
            # Container support disabled: the published sage:5.0 image has the unpatched JAR.
            # To re-enable, build a new image that includes the patched sage-5.1 JAR from modules/sage/1.2/jar/.
            sage: null

        resources:
            sage_run:
                mem_mb: 60000
                disk_mb: 10000
                bam: 1
            filter:
                mem_mb: 8000
                disk_mb: 10000

        threads:
            sage_run: 24
            filter: 1


        pairing_config:
            genome:
                run_paired_tumours: True
                run_unpaired_tumours_with: "unmatched_normal"
                run_paired_tumours_as_unpaired: False
            capture:
                run_paired_tumours: True
                run_unpaired_tumours_with: "unmatched_normal"
                run_paired_tumours_as_unpaired: False
