lcr-modules:

    mixcr:

        dirs:
            _parent: "__UPDATE__"

        inputs:
            # Available wildcards: {seq_type} {sample_id}
            sample_fastq_1: "__UPDATE__"
            sample_fastq_2: "__UPDATE__"
            # Path to the directory where MiXCR should be installed
            mixcr_exec: "__UPDATE__"
            # Only required when run_igblast_postprocessing is True.
            # Path to the igblastn fmt7 output from the igblast module:
            #   "{IGBLAST_OUT}/99-outputs/fmt7/{seq_type}/{sample_id}.{chain}.igblastn.fmt7"
            sample_igblast_fmt7: "__UPDATE__"

        scratch_subdirectories: []

        receptors: "__UPDATE__"
        ###### Desired IG/TCR chains in list format or keyword:
        ###### "ALL" = ['IGH', 'IGL', 'IGK', 'TRA', 'TRB', 'TRD', 'TRG']
        ###### "BCR" = ['IGH', 'IGL', 'IGK']
        ###### "TCR" = ['TRA', 'TRB', 'TRD', 'TRG']

        run_igblast_postprocessing: False
        # Boolean
        # Set to True to merge igblastn results (from the igblast module) back into
        # MiXCR clonotype tables, producing mixcr.{sample_id}.clonotypes.{chain}.igblast.txt.
        # Requires '--contig-assembly' in mixcr_run options and sample_igblast_fmt7 input.

        scripts:
            mixcr2fasta: "{MODSDIR}/src/mixcr_to_fasta.py"
            igblastn2mixcr: "{MODSDIR}/src/igblast_to_mixcr.py"

        options:
            mixcr_run:
                mrna:
                    --starting-material rna
                genome:
                    --starting-material dna

        conda_envs:
            java: "{MODSDIR}/envs/java-jdk-8.0.yaml"

        container_envs:
            java: "docker://quay.io/biocontainers/java-jdk:8.0.112--1"

        threads:
            mixcr_run: 4

        resources:
            mixcr_run:
                mem_mb: 10000
                fastq: 1

        pairing_config:
            genome:
                run_paired_tumours: False
                run_unpaired_tumours_with: "no_normal"
                run_paired_tumours_as_unpaired: True
            mrna:
                run_paired_tumours: False
                run_unpaired_tumours_with: "no_normal"
                run_paired_tumours_as_unpaired: True
