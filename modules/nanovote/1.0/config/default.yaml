lcr-modules:
    
    nanovote:

        inputs:
            # Available wildcards: {seq_type} {genome_build} {tumour_id} {normal_name} {chemistry} {platform}
            sample_bam: "__UPDATE__"
            sample_bai: "__UPDATE__"

            # Required for ClairS and DeepSomatic via NanoVote
            normal_bam: "__UPDATE__"
            normal_bai: "__UPDATE__"

            # NanoVote calls starfish.py directly; it does not include starfish.smk
            starfish_script: "{MODSDIR}/src/starfish.py"

        module_versions:
            clairs: "1.1"
            clairs_to: "1.1"
            deepsomatic: "1.0"
            starfish: "2.0"

        scratch_subdirectories: []

        options:
            normal_name:
                R9: "__UPDATE__"
                R10: "__UPDATE__"

            # This was previously only under nanovote: starfish:
            # Keep your existing Starfish value.
            starfish_run: "--sample ALT --squash-ploidy --vennout-format pdf --all-records"

            cleanup_vcfs: false

        conda_envs:
            bcftools: "{MODSDIR}/envs/bcftools-1.10.2.yaml"
            starfish: "{MODSDIR}/envs/starfish.yaml"

        container_envs:
            bcftools: "docker://quay.io/biocontainers/bcftools:1.10.2--h4f4756c_3"
            starfish: "docker://ghcr.io/lcr-bccrc/lcr-scripts/starfish:2.0"
            
        threads:
            starfish_run: 4
            rename_all: 4
            union_vcf: 4

        resources:
            starfish_run:
                mem_mb: 15000
            rename_all:
                mem_mb: 5000
            union_vcf:
                mem_mb: 5000
            
        pairing_config:
            promethION:
                run_paired_tumours: False
                run_unpaired_tumours_with: "no_normal"
                run_paired_tumours_as_unpaired: True

    ##### NanoVote SUBMODULE CONFIGURATION #####
        # These are stored as items under the `nanovote` keyword so that they can be used to 
        # update each module config without getting overwritten during configfile loading. 
        # It is strongly recommended that users copy this complete config file to their project space and update important values. 
        # Additional values from each default submodule config can be added, e.g. to update mem_mb per rule. 

        clairs: 
            inputs: 
                # Leave these blank, they will be updated by the Snakefile. 
                sample_bam: ""
                sample_bai: ""
            scratch_subdirectories: ["clairs"]
            options:
                clairs_args: "" # Change this line if you wish to use other flags for ClairS
                call_indels: true
                filters: # Update if you wish to use different filters
                    tumour_min_depth: 8
                    snv_min_af: 0.10
                    snv_min_alt_depth: 3
                    indel_min_af: 0.15
                    indel_min_alt_depth: 6
                    normal_min_depth: 10
                    normal_max_af: 0.05
                cleanup_toggle: true
            threads: 
                clairs: 24
                bcftools: 4
            resources:
              clairs:
                mem_mb: 24000
                bam: 2
                disk_mb: 10000
              bcftools:
                mem_mb: 5000

        clairs_to: 
            inputs: 
                # Leave these blank, they will be updated by the Snakefile. 
                sample_bam: ""
                sample_bai: ""
            scratch_subdirectories: ["clairs_to"]
            options:
                clairs_to_args: "" # Change this line if you wish to use other flags for ClairS-TO
                filters: # Update if you wish to use different filters
                    min_depth: 8
                    snv:
                        min_af: 0.10
                        min_alt_depth: 3
                    indel:
                        min_af: 0.15
                        min_alt_depth: 6
                cleanup_toggle: true
            threads: 
                clairs_to: 24
                bcftools: 4
            resources:
              clairs_to:
                mem_mb: 24000
                bam: 2
                disk_mb: 10000 # Will ensure at least this much space is left
              bcftools:
                mem_mb: 5000

        deepsomatic: 
            inputs: 
                # Leave these blank, they will be updated by the Snakefile. 
                sample_bam: ""
                sample_bai: ""
            scratch_subdirectories: ["deepsomatic_temp"]
            options:
                calling_mode: "unmatched" # Available: unmatched, tumour_only
                deepsomatic_args: "" # Change this line if you wish to use other internal flags for DeepSomatic
                cleanup_toggle: true
                filters:
                    min_depth: 8
                    snv_min_vaf: 0.10
                    snv_min_alt_depth: 3
                    indel_min_vaf: 0.15
                    indel_min_alt_depth: 6
                    normal_min_depth: 10
                    normal_max_af: 0.05
            resources:
                deepsomatic:
                    mem_mb: 72000 # DeepSomatic can consume large amounts of memory. If your run errors out, increase this number
                    disk_mb: 10000 # Will ensure at least this much space is left
                    bam: 2
            threads:
                deepsomatic: 24
                bcftools: 4
