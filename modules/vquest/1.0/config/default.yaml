lcr-modules:

    vquest:

        dirs:
            _parent: "__UPDATE__"

        inputs:
            # Path to input FASTA file.
            # Available wildcards: {seq_type}, {sample_id}, {chain}
            # From igseqr 1.0:
            #   "{IGSEQR_OUT}/99-outputs/fasta/{seq_type}--{hisat_ref}/{sample_id}_{chain}_transcripts.fasta"
            # From mixcr 1.3:
            #   "{MIXCR_OUT}/99-outputs/fasta/{seq_type}/mixcr.{sample_id}.clonotypes.{chain}.VDJseq.fasta"
            sample_fasta: "__UPDATE__"

            # Path to the source TSV to merge V-QUEST annotations into.
            # Only used when options.run_merge is True.
            # Available wildcards: {seq_type}, {sample_id}, {chain}
            #
            # From igseqr 1.0:
            #   "{IGSEQR_OUT}/99-outputs/tsv/{seq_type}--{hisat_ref}/{sample_id}_{chain}_report.tsv"
            #   Set options.source_id_column to "transcript_id".
            #
            # From mixcr 1.3:
            #   "{MIXCR_OUT}/99-outputs/txt/{seq_type}/mixcr.{sample_id}.clonotypes.{chain}.txt"
            #   Set options.source_id_column to "cloneId". The merge script automatically
            #   parses the compound FASTA header ("cloneId_N_readFraction_F_readCount_C")
            #   back to cloneId when "mixcr" is detected in either input file path.
            sample_source_tsv: "__UPDATE__"

        scratch_subdirectories: []

        options:
            chains: "__UPDATE__"
                # List of chains to analyse. Choose from:
                #   IGH, IGK, IGL, IGKL  (B-cell; IGKL = combined kappa/lambda from igseqr)
                #   TRA, TRB, TRD, TRG   (T-cell)

            species: "human"
                # IMGT V-QUEST species string. Common values:
                #   human, mouse, rat, rabbit, rhesus-monkey

            # Extra flags passed verbatim to run_vquest.py (currently unused placeholder).
            vquest_run: ""

            # Set to True to merge V-QUEST annotations into the source TSV.
            # Requires inputs.sample_source_tsv and options.source_id_column to be set.
            run_merge: False

            # Column name in sample_source_tsv that matches sequence_id in the V-QUEST AIRR TSV.
            #   igseqr 1.0 source → "transcript_id"
            #   mixcr 1.3 source  → "cloneId"
            source_id_column: "transcript_id"

            # AA source for glycosylation annotation. Choose:
            #   "fasta"     - translate cDNA FASTA using best of 6 ORFs (use for igseqr source)
            #   "mixcr_tsv" - assemble AA from aaSeq* fields in inputs.sample_source_tsv,
            #                 skipping "region_not_covered" values (use for MiXCR source;
            #                 requires inputs.sample_source_tsv to be set)
            glycosylation_source: "fasta"

        scripts:
            run_vquest: "{MODSDIR}/src/run_vquest.py"
            merge_tsv: "{MODSDIR}/src/merge_annotation_tsv.py"
            annotate_glycosylation: "{MODSDIR}/src/annotate_glycosylation.py"

        conda_envs:
            vquest: "{MODSDIR}/envs/vquest-1.0.yaml"
            glycosylation: "{MODSDIR}/envs/glycosylation-1.0.yaml"

        container_envs:
            vquest: "docker://quay.io/biocontainers/mulled-v2-placeholder:latest"
            # NOTE: No pre-built biocontainer exists for the vquest PyPI package.
            # Use the conda env (--use-conda) instead of --use-singularity for this module,
            # or build a custom image from the envs/vquest-1.0.yaml conda environment.

        threads:
            vquest_run: 1
            annotate_glycosylation: 1

        resources:
            vquest_run:
                mem_mb: 4000
            annotate_glycosylation:
                mem_mb: 4000

        pairing_config:
            genome:
                run_paired_tumours: False
                run_unpaired_tumours_with: "no_normal"
                run_paired_tumours_as_unpaired: True
            mrna:
                run_paired_tumours: False
                run_unpaired_tumours_with: "no_normal"
                run_paired_tumours_as_unpaired: True
            capture:
                run_paired_tumours: False
                run_unpaired_tumours_with: "no_normal"
                run_paired_tumours_as_unpaired: True
