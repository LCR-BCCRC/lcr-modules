lcr-modules:

    igseqr:

        inputs:
            # Available wildcards: {seq_type} {genome_build} {sample_id}
            sample_bam: "__UPDATE__"
            sample_bai: "__UPDATE__"
            # HISAT2 pre-built index to download, keyed by version string.
            # The key becomes the subdirectory name under {inputs_dir}/hisat_ref/.
            # Provide exactly one entry; to use a different index, change the key and URL.
            hisat_ref_url:
                hg38: "https://genome-idx.s3.amazonaws.com/hisat/grch38_snptran.tar.gz"

        scratch_subdirectories: []

        options:
            # Extra flags passed verbatim to igseqr (e.g. "--min_tpm 0.5").
            # Leave empty string for defaults.
            igseqr_run: ""

        conda_envs:
            igseqr: "{MODSDIR}/envs/igseqr-1.0.1.yaml"

        container_envs:
            igseqr: "docker://ghcr.io/lcr-bccrc/lcr-scripts/igseqr:1.0.1"

        threads:
            igseqr_run: 8

        resources:
            igseqr_run:
                mem_mb: 32000
            get_hisat_ref:
                mem_mb: 2000

        pairing_config:
            mrna:
                run_paired_tumours: False
                run_unpaired_tumours_with: "no_normal"
                run_paired_tumours_as_unpaired: True
