lcr-modules:

    igseqr:

        inputs:
            # Available wildcards: {seq_type} {genome_build} {sample_id}
            sample_bam: "__UPDATE__"
            sample_bai: "__UPDATE__"
            # Prefix path to the HISAT2 splice-aware index.
            # Recommended: GRCh38 with SNP and transcript annotation (grch38_snptran).
            # Download with: hisat2-build or retrieve from the HISAT2 pre-built index page.
            # Example: /path/to/hisat2_index/grch38_snptran/genome
            hisat_ref: "__UPDATE__"
            # Directory where IgSeqR will be cloned from GitHub and installed.
            # The install rule runs once and caches a sentinel file here.
            # Example: /path/to/tools/IgSeqR
            igseqr_dir: "__UPDATE__"

        scratch_subdirectories: []

        options:
            # Extra flags passed verbatim to igseqr (e.g. "--min_tpm 0.5").
            # Leave empty string for defaults.
            igseqr_run: ""

        conda_envs:
            igseqr: "{MODSDIR}/envs/igseqr-1.0.1.yaml"

        container_envs:
            igseqr: null

        threads:
            igseqr_run: 8

        resources:
            igseqr_run:
                mem_mb: 32000

        pairing_config:
            mrna:
                run_paired_tumours: False
                run_unpaired_tumours_with: "no_normal"
                run_paired_tumours_as_unpaired: True
